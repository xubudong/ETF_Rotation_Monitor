<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETF 轮动行情监控台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>ETF 轮动行情监控台</h1>
          <div id="statusText" class="status-line">正在加载...</div>
        </div>
        <div class="toolbar" aria-label="监控控制">
          <label class="field">
            <span>实时源</span>
            <select id="sourceSelect"></select>
          </label>
          <label class="field">
            <span>打分策略</span>
            <select id="strategySelect"></select>
          </label>
          <label class="field">
            <span>历史日期</span>
            <input id="rankingDate" type="date" />
          </label>
          <button id="historyRankingBtn" type="button">查看历史</button>
          <button id="liveRankingBtn" type="button" disabled>返回实时</button>
          <label class="field">
            <span>刷新间隔</span>
            <select id="intervalSelect">
              <option value="60">1 分钟</option>
              <option value="180" selected>3 分钟</option>
              <option value="300">5 分钟</option>
            </select>
          </label>
          <label class="toggle">
            <input id="autoRefresh" type="checkbox" checked />
            <span>自动刷新</span>
          </label>
          <button id="refreshBtn" class="primary" type="button">刷新</button>
          <button id="cacheBtn" type="button">更新本地库</button>
          <button id="techPoolBtn" type="button">更新科技池</button>
        </div>
      </header>

      <section class="filters" aria-label="表格筛选">
        <div id="cacheStatusPanel" class="cache-status-panel">
          <span class="cache-dot"></span>
          <strong>本地库</strong>
          <span id="cacheStatusText">正在读取本地库状态...</span>
        </div>
        <div id="techPoolStatusPanel" class="cache-status-panel tech-pool-status-panel">
          <span class="cache-dot"></span>
          <strong>科技池</strong>
          <span id="techPoolStatusText">正在读取活跃科技标的池...</span>
        </div>
        <div id="accountChangePanel" class="account-change-panel">
          <div class="account-change-card">
            <span>A 股板块轮动</span>
            <strong id="aShareTodayChange">-</strong>
            <small id="aShareTodayPnl">等待持仓数据</small>
          </div>
          <div class="account-change-card">
            <span>全球与大宗配置</span>
            <strong id="globalTodayChange">-</strong>
            <small id="globalTodayPnl">等待持仓数据</small>
          </div>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="filter-row">
          <label class="search">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="代码 / 名称 / 板块" />
          </label>
          <label class="field">
            <span>评级</span>
            <select id="ratingFilter">
              <option value="">全部</option>
              <option value="买入配仓">买入配仓</option>
              <option value="持有观察">持有观察</option>
              <option value="空仓回避">空仓回避</option>
            </select>
          </label>
          <label class="toggle">
            <input id="holdOnly" type="checkbox" />
            <span>仅持仓</span>
          </label>
          <label class="toggle">
            <input id="buyOnly" type="checkbox" />
            <span>仅买入</span>
          </label>
          <input id="aShareHoldFile" class="file-input" type="file" accept=".xls,.txt,.csv" />
          <button id="aShareHoldBtn" type="button">更新A股持仓</button>
          <input id="globalHoldFile" class="file-input" type="file" accept=".xls,.txt,.csv" />
          <button id="globalHoldBtn" type="button">更新全球持仓</button>
        </div>
      </section>

      <nav class="view-tabs" aria-label="页面视图">
        <button class="active" type="button" data-view="monitor">行情监控</button>
        <button type="button" data-view="backtest">策略回测</button>
      </nav>

      <div id="monitorView" class="view-panel active">
        <section class="summary-grid" id="summaryGrid"></section>

        <section class="portfolio-panel">
          <div class="portfolio-header">
            <div>
              <h2>组合诊断</h2>
              <div id="portfolioStatus" class="muted">等待持仓数据...</div>
            </div>
            <div class="portfolio-actions">
              <label class="field">
                <span>诊断账户</span>
                <select id="portfolioPoolSelect">
                  <option value="a_share">A 股板块轮动</option>
                  <option value="global">全球与大宗配置</option>
                  <option value="all">全部账户</option>
                </select>
              </label>
              <button id="portfolioRefreshBtn" type="button">刷新诊断</button>
            </div>
          </div>
          <div id="portfolioMetrics" class="portfolio-metrics"></div>
          <div class="portfolio-content">
            <div id="portfolioBars" class="portfolio-bars"></div>
            <div class="portfolio-detail-wrap">
              <table class="portfolio-detail-table">
                <thead>
                  <tr>
                    <th>一级行业</th>
                    <th>二级细分</th>
                    <th>代码</th>
                    <th>名称</th>
                    <th>穿透金额</th>
                    <th>占比</th>
                  </tr>
                </thead>
                <tbody id="portfolioDetailBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="table-panel">
          <div class="table-header">
            <h2 id="tableTitle">排名</h2>
            <div id="rowCount" class="muted"></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr id="tableHead"></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <section id="backtestView" class="backtest-panel view-panel">
        <div class="backtest-header">
          <div>
            <h2>策略回测</h2>
            <div id="backtestStatus" class="muted">使用当前本地库历史数据，按所选打分策略生成每日目标组合。</div>
          </div>
          <div class="backtest-actions">
            <label class="field">
              <span>回测池</span>
              <select id="backtestPoolSelect">
                <option value="a_share">A 股板块轮动</option>
                <option value="global">全球与大宗配置</option>
                <option value="new_tech">活跃科技标的</option>
              </select>
            </label>
            <label class="field">
              <span>策略</span>
              <select id="backtestStrategySelect"></select>
            </label>
            <label class="field">
              <span>成交方式</span>
              <select id="backtestExecutionMode">
                <option value="next_open" selected>次日开盘成交</option>
                <option value="same_close">当日收盘成交</option>
              </select>
            </label>
            <label class="field">
              <span>区间</span>
              <select id="backtestMonths">
                <option value="1">1 个月</option>
                <option value="3">3 个月</option>
                <option value="6">6 个月</option>
                <option value="12" selected>12 个月</option>
                <option value="24">24 个月</option>
                <option value="36">36 个月</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <div id="backtestCustomRange" class="custom-range hidden">
              <label class="field">
                <span>开始日期</span>
                <input id="backtestStartDate" type="date" />
              </label>
              <label class="field">
                <span>结束日期</span>
                <input id="backtestEndDate" type="date" />
              </label>
            </div>
            <label class="field">
              <span>基准</span>
              <select id="backtestBenchmark"></select>
            </label>
            <button id="backtestBtn" type="button">生成回测</button>
            <button id="backtestExportBtn" type="button" disabled>导出明细</button>
            <button id="backtestFullscreenBtn" type="button">全屏图表</button>
          </div>
        </div>
        <div id="backtestMetrics" class="backtest-metrics"></div>
        <div class="backtest-content">
          <div id="backtestChart" class="backtest-chart" role="img" aria-label="回测收益和回撤曲线"></div>
          <div class="backtest-rebalance-wrap">
            <div class="backtest-table-title">
              <strong>标的最终盈亏</strong>
              <span>逐笔交易请导出明细</span>
            </div>
            <table class="backtest-rebalance-table">
              <thead>
                <tr>
                  <th>代码</th>
                  <th>名称</th>
                  <th>状态</th>
                  <th>买/卖</th>
                  <th>累计买入</th>
                  <th>累计卖出</th>
                  <th>期末市值</th>
                  <th>最终盈亏</th>
                  <th>收益率</th>
                </tr>
              </thead>
              <tbody id="backtestRebalanceBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/vendor/plotly.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
